<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MediaFetch</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0a0f;
  --surface:   #12121a;
  --surface2:  #1a1a26;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --accent:    #00e5ff;
  --accent2:   #7b61ff;
  --gold:      #ffd166;
  --red:       #ff4757;
  --green:     #2ed573;
  --text:      #e8e8f0;
  --muted:     rgba(232,232,240,0.45);
  --radius:    14px;
  --radius-sm: 8px;
  --font:      'Syne', sans-serif;
  --mono:      'JetBrains Mono', monospace;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; overscroll-behavior: none;
}
body { overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 256px; pointer-events: none; opacity: 0.6;
}

#app {
  position: relative; z-index: 1; min-height: 100dvh;
  display: flex; flex-direction: column;
  max-width: 520px; margin: 0 auto;
  padding: 0 0 env(safe-area-inset-bottom) 0;
}

/* ── Header ─────────────────────────────────────────────────────── */
header {
  padding: 14px 16px 10px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,10,15,0.88);
}
.logo-mark {
  width: 32px; height: 32px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius: 9px; display: flex; align-items: center; justify-content: center;
  font-size: 15px; box-shadow: 0 0 18px rgba(0,229,255,0.22);
}
header h1 {
  font-size: 17px; font-weight: 800; letter-spacing: -0.3px;
  background: linear-gradient(135deg, #fff 40%, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
header .sub { font-size: 10px; color: var(--muted); font-family: var(--mono); }

/* ── Nav bar ─────────────────────────────────────────────────────── */
.nav-bar {
  display: flex; border-top: 1px solid var(--border);
  background: rgba(10,10,15,0.92); backdrop-filter: blur(20px);
  position: sticky; bottom: 0; z-index: 50;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; padding: 10px 4px;
  background: none; border: none;
  color: var(--muted); font-family: var(--font);
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  cursor: pointer; transition: color 0.2s; position: relative;
}
.nav-tab .ni { font-size: 20px; line-height: 1; }
.nav-tab.active { color: var(--accent); }
.nav-tab.active::before {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%;
  height: 2px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 0 0 2px 2px;
}
.nav-badge {
  position: absolute; top: 7px; right: calc(50% - 18px);
  background: var(--accent2); color: #fff;
  font-size: 9px; font-weight: 700; min-width: 16px; height: 16px;
  border-radius: 8px; padding: 0 4px;
  display: none; align-items: center; justify-content: center;
  font-family: var(--mono);
}
.nav-badge.show { display: flex; }

/* ── Main ────────────────────────────────────────────────────────── */
main {
  flex: 1; overflow-y: auto;
  padding: 16px 16px 24px;
  display: flex; flex-direction: column; gap: 14px;
}

.view { display: none; flex-direction: column; gap: 14px; animation: fadeUp 0.25s ease; }
.view.active { display: flex; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Input card ──────────────────────────────────────────────────── */
.input-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  transition: border-color 0.2s;
}
.input-card:focus-within { border-color: var(--accent2); }
.input-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; color: var(--muted); font-family: var(--mono);
}
.url-row { display: flex; gap: 8px; }
#url-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: var(--mono); font-size: 13px; padding: 10px 12px;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
#url-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(123,97,255,0.15); }
#url-input::placeholder { color: rgba(255,255,255,0.2); }
.icon-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--muted); font-size: 16px;
  padding: 0 11px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; flex-shrink: 0;
}
.icon-btn:active { transform: scale(0.92); }

.tabs { display: flex; gap: 6px; }
.tab-btn {
  flex: 1; padding: 8px 4px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--muted);
  font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.tab-btn.active {
  background: linear-gradient(135deg, rgba(123,97,255,0.2), rgba(0,229,255,0.1));
  border-color: var(--accent2); color: var(--accent);
}

/* ── Buttons ─────────────────────────────────────────────────────── */
.btn-primary {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border: none; border-radius: var(--radius-sm);
  color: #fff; font-family: var(--font); font-size: 14px; font-weight: 700;
  letter-spacing: 0.03em; cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.btn-primary::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,0); transition:background 0.15s; }
.btn-primary:active::after { background: rgba(255,255,255,0.12); }
.btn-primary:disabled { opacity: 0.42; cursor: not-allowed; }
.btn-ghost {
  background: transparent; border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--muted);
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 9px 16px; cursor: pointer; transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--accent2); color: var(--accent); }
.btn-danger {
  background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3);
  border-radius: var(--radius-sm); color: var(--red);
  font-family: var(--font); font-size: 12px; font-weight: 600;
  padding: 7px 12px; cursor: pointer; transition: all 0.2s;
}
.btn-danger:hover { background: rgba(255,71,87,0.2); }

/* ── Section label ───────────────────────────────────────────────── */
.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); font-family: var(--mono); padding: 0 2px;
}
.section-row { display: flex; align-items: center; justify-content: space-between; }

/* ── Media card ──────────────────────────────────────────────────── */
.media-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.thumb-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  background: var(--surface2); overflow: hidden;
}
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
.thumb-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,10,15,0.85) 0%, transparent 55%);
}
.thumb-badge {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
  border: 1px solid var(--border2); border-radius: 20px;
  padding: 3px 8px; font-family: var(--mono); font-size: 11px;
}
.media-meta { padding: 12px 14px; }
.media-title {
  font-size: 14px; font-weight: 700; line-height: 1.35; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.meta-row { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; color: var(--muted); font-family: var(--mono); }

/* ── Format buttons ──────────────────────────────────────────────── */
.format-grid { display: flex; flex-direction: column; gap: 6px; }
.format-btn {
  display: flex; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 13px;
  cursor: pointer; transition: all 0.18s; text-align: left; width: 100%; gap: 11px;
}
.format-btn:active { transform: scale(0.98); }
.format-btn.selected { border-color: var(--accent); background: rgba(0,229,255,0.05); box-shadow: 0 0 0 1px rgba(0,229,255,0.15); }
.format-btn:hover:not(.selected) { border-color: var(--border2); background: var(--surface2); }
.fmt-icon {
  font-size: 18px; flex-shrink: 0; width: 34px; height: 34px;
  background: var(--surface2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.fmt-info { flex: 1; }
.fmt-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.fmt-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.fmt-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 3px 7px; border-radius: 4px; flex-shrink: 0;
}
.fmt-badge.video { background: rgba(123,97,255,0.2); color: var(--accent2); }
.fmt-badge.audio { background: rgba(0,229,255,0.15); color: var(--accent); }
.fmt-badge.best  { background: rgba(255,209,102,0.2); color: var(--gold); }
.check-mark {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-size: 10px;
}
.format-btn.selected .check-mark { background: var(--accent); border-color: var(--accent); color: #000; }

/* ── Download bar ────────────────────────────────────────────────── */
.download-bar {
  position: sticky; bottom: 0; padding: 10px 16px 12px;
  background: linear-gradient(to top, rgba(10,10,15,1) 65%, transparent); z-index: 40;
}

/* ── Progress ────────────────────────────────────────────────────── */
.progress-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  display: flex; flex-direction: column; gap: 14px;
}
.prog-title {
  font-size: 14px; font-weight: 700; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.prog-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse-dot 1.5s infinite; }
.status-dot.downloading { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.status-dot.uploading   { background: var(--gold);   box-shadow: 0 0 8px var(--gold); }
.status-dot.done        { background: var(--green);  box-shadow: 0 0 8px var(--green); animation: none; }
.status-dot.error       { background: var(--red);    box-shadow: 0 0 8px var(--red); animation: none; }
.status-dot.queued      { background: var(--muted);  animation: none; }
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.75)} }

.progress-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 2px; transition: width 0.4s ease; position: relative;
}
.progress-fill.shimmer::after {
  content: ''; position: absolute; top: 0; right: 0; width: 40px; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35));
  animation: shimmer 1s infinite;
}
@keyframes shimmer { from{transform:translateX(-40px)} to{transform:translateX(0)} }

.prog-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.stat-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; }
.stat-val { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.stat-key { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
.done-icon { font-size: 44px; text-align: center; }
.done-text { text-align: center; font-size: 15px; font-weight: 700; margin-top: 4px; }
.done-sub  { text-align: center; font-size: 12px; color: var(--muted); font-family: var(--mono); }

/* ── Playlist ────────────────────────────────────────────────────── */
.playlist-header {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
}
.playlist-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.playlist-count { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.playlist-actions { display: flex; gap: 6px; margin-top: 10px; }
.entry-list { display: flex; flex-direction: column; gap: 6px; }
.entry-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 12px;
  cursor: pointer; transition: all 0.15s;
}
.entry-item:active { transform: scale(0.99); }
.entry-item:hover { border-color: var(--border2); }
.entry-num { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 22px; text-align: right; }
.entry-thumb { width: 52px; height: 30px; object-fit: cover; border-radius: 4px; background: var(--surface2); flex-shrink: 0; }
.entry-title { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.entry-dur { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; }

/* ── History ─────────────────────────────────────────────────────── */
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  position: relative; overflow: hidden; transition: all 0.15s;
}
.history-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
.history-item.video::before { background: var(--accent2); }
.history-item.audio::before { background: var(--accent); }
.history-item:hover { border-color: var(--border2); }
.hist-thumb { width: 56px; height: 36px; object-fit: cover; border-radius: 6px; background: var(--surface2); flex-shrink: 0; }
.hist-thumb-ph {
  width: 56px; height: 36px; border-radius: 6px; background: var(--surface2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.hist-info { flex: 1; min-width: 0; }
.hist-title { font-size: 13px; font-weight: 600; line-height: 1.3; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-bottom: 3px; }
.hist-meta { display: flex; gap: 8px; font-size: 10px; color: var(--muted); font-family: var(--mono); flex-wrap: wrap; align-items: center; }
.hist-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; font-family: var(--mono); }
.hist-badge.video { background: rgba(123,97,255,0.2); color: var(--accent2); }
.hist-badge.audio { background: rgba(0,229,255,0.15); color: var(--accent); }
.hist-redl {
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer; padding: 4px; transition: color 0.2s; flex-shrink: 0;
}
.hist-redl:hover { color: var(--accent); }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; padding: 40px 20px; text-align: center;
}
.empty-icon { font-size: 42px; }
.empty-title { font-size: 15px; font-weight: 700; }
.empty-sub { font-size: 13px; color: var(--muted); }

/* ── Error box ───────────────────────────────────────────────────── */
.error-box {
  background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.28);
  border-radius: var(--radius-sm); padding: 12px 14px;
  font-size: 13px; color: #ff8a8a; font-family: var(--mono); line-height: 1.5;
}

/* ── Toast ───────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 9px 18px;
  font-size: 13px; font-weight: 500; white-space: nowrap;
  z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none;
}
#toast.show { opacity: 1; }

/* ── Spinner ─────────────────────────────────────────────────────── */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row {
  display: flex; align-items: center; gap: 10px; justify-content: center;
  padding: 24px; color: var(--muted); font-size: 13px; font-family: var(--mono);
}

/* ── Sites strip ─────────────────────────────────────────────────── */
.sites-strip { overflow: hidden; padding: 4px 0; }
.sites-inner { display: flex; gap: 8px; animation: scroll-x 22s linear infinite; width: max-content; }
@keyframes scroll-x { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.site-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--muted); white-space: nowrap;
}
</style>
</head>

<body>
<div id="app">

  <header>
    <div class="logo-mark">⚡</div>
    <div style="flex:1;min-width:0">
      <h1>MediaFetch</h1>
      <div class="sub">yt-dlp · 1000+ sites</div>
    </div>
  </header>

  <main id="main">

    <!-- Home -->
    <div class="view active" id="view-home">
      <div class="input-card">
        <div class="input-label">Paste a URL</div>
        <div class="url-row">
          <input id="url-input" type="url" placeholder="https://youtube.com/watch?v=…">
          <button class="icon-btn" onclick="pasteUrl()" title="Paste">📋</button>
          <button class="icon-btn" onclick="clearUrl()" title="Clear">✕</button>
        </div>
        <div class="tabs">
          <button class="tab-btn active" onclick="setMode('single',this)">🎬 Single</button>
          <button class="tab-btn" onclick="setMode('playlist',this)">📋 Playlist</button>
        </div>
        <button class="btn-primary" id="fetch-btn" onclick="fetchMedia()">Fetch Media Info</button>
      </div>
      <div class="section-label">Supported Sites</div>
      <div class="sites-strip"><div class="sites-inner" id="sites-inner"></div></div>
    </div>

    <!-- Formats -->
    <div class="view" id="view-formats">
      <div class="media-card" id="media-card"></div>
      <div class="section-label">Presets</div>
      <div class="format-grid" id="presets-grid"></div>
      <div class="section-label">Video Formats</div>
      <div class="format-grid" id="video-grid"></div>
      <div class="section-label">Audio Formats</div>
      <div class="format-grid" id="audio-grid"></div>
      <div style="height:72px"></div>
    </div>

    <!-- Playlist -->
    <div class="view" id="view-playlist">
      <div class="playlist-header">
        <div class="playlist-title" id="pl-title">Loading…</div>
        <div class="playlist-count" id="pl-count"></div>
        <div class="playlist-actions">
          <button class="btn-ghost" style="flex:1" onclick="downloadAll('video')">⬇ All (Best)</button>
          <button class="btn-ghost" style="flex:1" onclick="downloadAll('audio')">🎵 All Audio</button>
        </div>
      </div>
      <div class="section-label">Entries</div>
      <div class="entry-list" id="entry-list"></div>
    </div>

    <!-- Progress -->
    <div class="view" id="view-progress">
      <div class="progress-card">
        <div id="prog-title" class="prog-title">Preparing…</div>
        <div class="prog-status">
          <div class="status-dot queued" id="status-dot"></div>
          <span id="status-label">Queued</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="prog-stats">
          <div class="stat-box"><div class="stat-val" id="stat-pct">0%</div><div class="stat-key">Progress</div></div>
          <div class="stat-box"><div class="stat-val" id="stat-speed">—</div><div class="stat-key">Speed</div></div>
          <div class="stat-box"><div class="stat-val" id="stat-eta">—</div><div class="stat-key">ETA</div></div>
        </div>
        <div id="prog-size" style="font-size:11px;color:var(--muted);font-family:var(--mono);text-align:center"></div>
        <div id="done-section" style="display:none;flex-direction:column;gap:10px;align-items:center">
          <div class="done-icon">✅</div>
          <div class="done-text">Sent to your chat!</div>
          <div class="done-sub">Check your Telegram</div>
          <button class="btn-primary" onclick="goHome()" style="margin-top:4px">Download Another</button>
        </div>
        <div id="error-section" style="display:none;flex-direction:column;gap:10px">
          <div class="error-box" id="error-msg"></div>
          <button class="btn-primary" onclick="goBack()">← Go Back</button>
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="view" id="view-history">
      <div class="section-row">
        <div class="section-label">Download History</div>
        <button class="btn-danger" id="clear-btn" onclick="clearHistory()" style="display:none">🗑 Clear All</button>
      </div>
      <div id="hist-container"></div>
    </div>

  </main>

  <!-- Download sticky bar -->
  <div class="download-bar" id="dl-bar" style="display:none">
    <button class="btn-primary" id="dl-btn" onclick="startDownload()" disabled>Select a format to download</button>
  </div>

  <!-- Bottom nav -->
  <nav class="nav-bar">
    <button class="nav-tab active" id="nav-home" onclick="navTo('home')">
      <span class="ni">🏠</span>Home
    </button>
    <button class="nav-tab" id="nav-history" onclick="navTo('history')">
      <span class="ni">🕓</span>History
      <span class="nav-badge" id="hist-badge"></span>
    </button>
  </nav>

  <div id="toast"></div>
</div>

<script>
// ── Telegram WebApp ────────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0a0a0f'); tg.setBackgroundColor('#0a0a0f'); }

// Telegram BackButton
const TgBack = tg?.BackButton;
if (TgBack) TgBack.onClick(() => goBack());

// Set API base — same origin when served by FastAPI.
// For local dev without a server, uncomment: const API = 'http://localhost:8000';
const API = '';

const CHAT_ID = tg?.initDataUnsafe?.user?.id || null;

// ── View stack ─────────────────────────────────────────────────────────────────
// Stack always starts at the root of current tab
const viewStack = [];
let activeTab = 'home'; // 'home' | 'history'

function stackRoot(viewId) {
  viewStack.length = 0;
  viewStack.push(viewId);
  syncBackBtn();
}

function stackPush(viewId) {
  if (viewStack[viewStack.length - 1] !== viewId) viewStack.push(viewId);
  syncBackBtn();
}

function stackPop() {
  if (viewStack.length > 1) viewStack.pop();
  syncBackBtn();
  return viewStack[viewStack.length - 1];
}

function syncBackBtn() {
  if (!TgBack) return;
  viewStack.length > 1 ? TgBack.show() : TgBack.hide();
}

// ── Show a view ────────────────────────────────────────────────────────────────
function showView(id, push = true) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${id}`).classList.add('active');
  document.getElementById('dl-bar').style.display = id === 'formats' ? 'block' : 'none';
  document.getElementById('main').scrollTop = 0;
  if (push) stackPush(id);
  syncBackBtn();
}

// ── Back ───────────────────────────────────────────────────────────────────────
function goBack() {
  if (viewStack.length <= 1) return;
  const prev = stackPop();
  showView(prev, false);
  // If going back to home, cancel any poll
  if (prev === 'home') {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  }
}

function goHome() {
  stackRoot('home');
  showView('home', false);
  setActiveNavTab('home');
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

// ── Bottom nav ─────────────────────────────────────────────────────────────────
function setActiveNavTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`nav-${tab}`).classList.add('active');
}

function navTo(tab) {
  setActiveNavTab(tab);
  if (tab === 'home') {
    stackRoot('home');
    showView('home', false);
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  } else if (tab === 'history') {
    stackRoot('history');
    showView('history', false);
    renderHistory();
  }
}

// ── State ──────────────────────────────────────────────────────────────────────
let mode = 'single';
let selectedFmt = null;
let currentUrl = '';
let currentTitle = '';
let currentThumb = '';
let pollInterval = null;

// ── History ────────────────────────────────────────────────────────────────────
const HIST_KEY = `mf_hist_${CHAT_ID || 'anon'}`;

function loadHist() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
  catch { return []; }
}

function saveHist(arr) {
  try { localStorage.setItem(HIST_KEY, JSON.stringify(arr.slice(0, 50))); }
  catch(e) { console.warn('localStorage unavailable:', e); }
}

function addHist(entry) {
  const h = loadHist().filter(x => !(x.url === entry.url && x.fmt === entry.fmt));
  h.unshift(entry);
  saveHist(h);
  refreshBadge();
}

function refreshBadge() {
  const n = loadHist().length;
  const b = document.getElementById('hist-badge');
  if (n > 0) { b.textContent = n > 99 ? '99+' : n; b.classList.add('show'); }
  else { b.classList.remove('show'); }
}

function clearHistory() {
  if (!confirm('Clear all download history?')) return;
  localStorage.removeItem(HIST_KEY);
  refreshBadge();
  renderHistory();
  showToast('History cleared');
}

function renderHistory() {
  const hist = loadHist();
  const container = document.getElementById('hist-container');
  const clearBtn = document.getElementById('clear-btn');

  if (!hist.length) {
    clearBtn.style.display = 'none';
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-title">No downloads yet</div>
        <div class="empty-sub">Your history appears here after each download</div>
      </div>`;
    return;
  }

  clearBtn.style.display = 'block';
  const list = document.createElement('div');
  list.className = 'history-list';

  hist.forEach(e => {
    const item = document.createElement('div');
    item.className = `history-item ${e.type || 'video'}`;

    let dateStr = '';
    try {
      const d = new Date(e.at);
      dateStr = d.toLocaleDateString(undefined, {month:'short',day:'numeric'}) + ' ' +
                d.toLocaleTimeString(undefined, {hour:'2-digit',minute:'2-digit'});
    } catch {}

    // Encode entry data for redownload button (avoid nested quotes)
    const safeEntry = btoa(JSON.stringify(e));

    item.innerHTML = `
      ${e.thumb
        ? `<img class="hist-thumb" src="${escHtml(e.thumb)}" alt="" onerror="this.outerHTML='<div class=hist-thumb-ph>${e.type==='audio'?'🎵':'🎬'}</div>'">`
        : `<div class="hist-thumb-ph">${e.type === 'audio' ? '🎵' : '🎬'}</div>`}
      <div class="hist-info">
        <div class="hist-title">${escHtml(e.title)}</div>
        <div class="hist-meta">
          <span class="hist-badge ${e.type || 'video'}">${(e.type||'VIDEO').toUpperCase()}</span>
          <span>${escHtml(e.fmt || '')}</span>
          ${dateStr ? `<span>${dateStr}</span>` : ''}
        </div>
      </div>
      <button class="hist-redl" title="Re-download" onclick="redownload('${safeEntry}')">↺</button>`;

    list.appendChild(item);
  });

  container.innerHTML = '';
  container.appendChild(list);
}

function redownload(b64) {
  try {
    const e = JSON.parse(atob(b64));
    document.getElementById('url-input').value = e.url;
    currentUrl = e.url;
    navTo('home');
    showToast('URL loaded — tap Fetch to pick format');
  } catch(err) { showToast('Could not load URL'); }
}

// ── Sites strip ────────────────────────────────────────────────────────────────
const SITES = ['YouTube','Instagram','TikTok','Twitter/X','Reddit','Facebook','Vimeo',
  'Twitch','SoundCloud','Bilibili','Dailymotion','Pinterest','LinkedIn','Snapchat',
  'Tumblr','Odysee','PeerTube','Rumble','BandCamp','Mixcloud','NicoNico','VK','OK.ru','Weibo'];
const si = document.getElementById('sites-inner');
[...SITES,...SITES].forEach(s => { const d=document.createElement('div'); d.className='site-chip'; d.textContent=s; si.appendChild(d); });

// ── Input helpers ──────────────────────────────────────────────────────────────
async function pasteUrl() {
  try { document.getElementById('url-input').value = await navigator.clipboard.readText(); showToast('Pasted ✓'); }
  catch { showToast('Tap input to paste manually'); }
}
function clearUrl() { document.getElementById('url-input').value = ''; document.getElementById('url-input').focus(); }
function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('fetch-btn').textContent = m === 'playlist' ? 'Fetch Playlist' : 'Fetch Media Info';
}

// ── Fetch ──────────────────────────────────────────────────────────────────────
async function fetchMedia() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { showToast('Enter a URL first'); return; }
  const btn = document.getElementById('fetch-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  currentUrl = url;
  try {
    if (mode === 'playlist') await fetchPlaylist(url);
    else await fetchSingle(url);
  } catch(e) {
    showToast('❌ ' + (e.message || 'Failed to fetch'));
  } finally {
    btn.disabled = false;
    btn.textContent = mode === 'playlist' ? 'Fetch Playlist' : 'Fetch Media Info';
  }
}

async function fetchSingle(url) {
  const res = await fetch(`${API}/api/info`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}),
  });
  if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.detail||'Failed'); }
  const info = await res.json();
  currentTitle = info.title; currentThumb = info.thumbnail || '';
  renderFormats(info);
  showView('formats');
}

async function fetchPlaylist(url) {
  const res = await fetch(`${API}/api/playlist`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}),
  });
  if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.detail||'Failed'); }
  const data = await res.json();
  renderPlaylist(data);
  showView('playlist');
}

// ── Render formats ─────────────────────────────────────────────────────────────
function renderFormats(info) {
  selectedFmt = null;
  document.getElementById('dl-btn').disabled = true;
  document.getElementById('dl-btn').textContent = 'Select a format to download';

  const thumb = info.thumbnail
    ? `<div class="thumb-wrap"><img src="${info.thumbnail}" alt="" onerror="this.parentElement.style.display='none'"><div class="thumb-overlay"></div>${info.duration_str?`<div class="thumb-badge">${info.duration_str}</div>`:''}</div>` : '';

  document.getElementById('media-card').innerHTML = `${thumb}
    <div class="media-meta">
      <div class="media-title">${escHtml(info.title)}</div>
      <div class="meta-row">
        ${info.uploader?`<span>👤 ${escHtml(info.uploader)}</span>`:''}
        ${info.view_count?`<span>👁 ${(info.view_count/1000).toFixed(0)}K</span>`:''}
        ${info.extractor?`<span>🌐 ${escHtml(info.extractor)}</span>`:''}
      </div>
    </div>`;

  const pg = document.getElementById('presets-grid');
  pg.innerHTML = '';
  [
    {label:'⚡ Best Quality', sub:'Auto best video+audio', dl_format:'bestvideo+bestaudio/best', media_type:'video', icon:'⚡', badge:'best'},
    {label:'🎵 Audio Only (MP3)', sub:'Best audio → MP3 192kbps', dl_format:'bestaudio/best', media_type:'audio', icon:'🎵', badge:'audio'},
  ].forEach(p => pg.appendChild(mkFmtBtn(p)));

  const vg = document.getElementById('video-grid');
  vg.innerHTML = '';
  if (!info.formats.video.length) vg.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:2px 0">No separate video streams</div>';
  else info.formats.video.forEach(f => vg.appendChild(mkFmtBtn({
    label:`${f.label} + Best Audio`, sub:`${f.ext.toUpperCase()} · ${f.filesize_str}`,
    dl_format:f.dl_format, media_type:'video', icon:'🎬', badge:'video',
  })));

  const ag = document.getElementById('audio-grid');
  ag.innerHTML = '';
  if (!info.formats.audio.length) ag.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:2px 0">No separate audio streams</div>';
  else info.formats.audio.forEach(f => ag.appendChild(mkFmtBtn({
    label:f.label, sub:f.filesize_str, dl_format:f.dl_format, media_type:'audio', icon:'🎵', badge:'audio',
  })));
}

function mkFmtBtn({label, sub, dl_format, media_type, icon, badge}) {
  const btn = document.createElement('button');
  btn.className = 'format-btn';
  btn.innerHTML = `<div class="fmt-icon">${icon}</div>
    <div class="fmt-info"><div class="fmt-label">${escHtml(label)}</div>${sub?`<div class="fmt-sub">${escHtml(sub)}</div>`:''}</div>
    <span class="fmt-badge ${badge}">${badge.toUpperCase()}</span>
    <div class="check-mark">✓</div>`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedFmt = {dl_format, media_type, label};
    document.getElementById('dl-btn').disabled = false;
    document.getElementById('dl-btn').textContent = `Download · ${label}`;
  });
  return btn;
}

// ── Render playlist ────────────────────────────────────────────────────────────
function renderPlaylist(data) {
  document.getElementById('pl-title').textContent = data.title;
  document.getElementById('pl-count').textContent = `${data.count} videos`;
  window._pl = data;
  const list = document.getElementById('entry-list');
  list.innerHTML = '';
  data.entries.forEach(e => {
    const item = document.createElement('div');
    item.className = 'entry-item';
    const ds = e.duration ? `${Math.floor(e.duration/60)}:${String(Math.floor(e.duration%60)).padStart(2,'0')}` : '';
    item.innerHTML = `<span class="entry-num">${e.index+1}</span>
      ${e.thumbnail?`<img class="entry-thumb" src="${e.thumbnail}" alt="" onerror="this.remove()">` : ''}
      <span class="entry-title">${escHtml(e.title)}</span>
      ${ds?`<span class="entry-dur">${ds}</span>`:''}`;
    item.addEventListener('click', () => loadEntryFormats(e));
    list.appendChild(item);
  });
}

async function loadEntryFormats(e) {
  document.getElementById('entry-list').innerHTML = '<div class="loading-row"><div class="spinner"></div> Loading formats…</div>';
  try {
    const res = await fetch(`${API}/api/info`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:e.url})});
    if (!res.ok) throw new Error('Failed');
    const info = await res.json();
    currentUrl = e.url; currentTitle = info.title; currentThumb = info.thumbnail || '';
    renderFormats(info);
    showView('formats');
  } catch {
    showToast('❌ Failed to fetch entry formats');
    renderPlaylist(window._pl);
  }
}

async function downloadAll(mediaType) {
  if (!CHAT_ID) { showToast('⚠ Could not detect your Telegram ID'); return; }
  const data = window._pl; if (!data) return;
  showToast(`Starting ${data.count} downloads…`, 3000);
  for (const e of data.entries) {
    if (!e.url) continue;
    await triggerDownload(e.url, mediaType==='audio'?'bestaudio/best':'bestvideo+bestaudio/best', mediaType, e.title, e.thumbnail||'', 'Best');
    await new Promise(r => setTimeout(r, 1500));
  }
}

// ── Download ───────────────────────────────────────────────────────────────────
async function startDownload() {
  if (!selectedFmt) return;
  if (!CHAT_ID) { showToast('⚠ Open via your Telegram bot to download'); return; }
  await triggerDownload(currentUrl, selectedFmt.dl_format, selectedFmt.media_type, currentTitle, currentThumb, selectedFmt.label);
}

async function triggerDownload(url, fmt, type, title, thumb, fmtLabel) {
  showView('progress');
  document.getElementById('prog-title').textContent = title || url;
  document.getElementById('done-section').style.display = 'none';
  document.getElementById('error-section').style.display = 'none';
  document.getElementById('prog-size').textContent = '';
  const fill = document.getElementById('prog-fill');
  fill.style.width = '0%'; fill.classList.add('shimmer');
  updateProgUI({status:'queued', progress:0, speed:'—', eta:'—'});

  try {
    const res = await fetch(`${API}/api/download`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url, format_id:fmt, media_type:type, chat_id:CHAT_ID, title:title||''}),
    });
    if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.detail||'Failed'); }
    const {job_id} = await res.json();
    pollJob(job_id, {url, title, thumb, type, fmtLabel});
  } catch(e) {
    fill.classList.remove('shimmer');
    document.getElementById('error-msg').textContent = e.message;
    document.getElementById('error-section').style.display = 'flex';
  }
}

function pollJob(jobId, meta) {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const res = await fetch(`${API}/api/job/${jobId}`);
      if (!res.ok) return;
      const job = await res.json();
      updateProgUI(job);
      if (job.status === 'done') {
        clearInterval(pollInterval); pollInterval = null;
        document.getElementById('prog-fill').classList.remove('shimmer');
        document.getElementById('done-section').style.display = 'flex';
        addHist({url:meta.url, title:meta.title||meta.url, thumb:meta.thumb||'', type:meta.type, fmt:meta.fmtLabel||'', at:new Date().toISOString()});
      } else if (job.status === 'error') {
        clearInterval(pollInterval); pollInterval = null;
        document.getElementById('prog-fill').classList.remove('shimmer');
        document.getElementById('error-msg').textContent = job.error || 'Unknown error';
        document.getElementById('error-section').style.display = 'flex';
      }
    } catch {}
  }, 1000);
}

function updateProgUI(job) {
  const pct = job.progress || 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('stat-speed').textContent = job.speed || '—';
  document.getElementById('stat-eta').textContent = job.eta || '—';
  if (job.downloaded && job.total) document.getElementById('prog-size').textContent = `${job.downloaded} / ${job.total}`;
  document.getElementById('status-dot').className = 'status-dot ' + (job.status || 'queued');
  const labels = {queued:'Queued…',downloading:'Downloading…',uploading:'Uploading to Telegram…',done:'Done!',error:'Error'};
  document.getElementById('status-label').textContent = labels[job.status] || job.status;
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function showToast(msg, ms=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── escHtml ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ── Init ───────────────────────────────────────────────────────────────────────
refreshBadge();
stackRoot('home');
syncBackBtn();
</script>
</body>
</html>
