<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>YouTube Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div id="app">
      <header>
        <div class="logo-mark">⚡</div>
        <div style="flex: 1; min-width: 0">
          <h1>YouTube Downloader</h1>
          <div class="sub">yt-dlp · 1000+ sites</div>
        </div>
      </header>

      <main id="main">
        <!-- Home -->
        <div class="view active" id="view-home">
          <div class="input-card">
            <div class="input-label">Paste a URL</div>
            <div class="url-row">
              <input
                id="url-input"
                type="url"
                placeholder="https://youtube.com/watch?v=…"
              />
              <button class="icon-btn" onclick="pasteUrl()" title="Paste">
                📋
              </button>
              <button class="icon-btn" onclick="clearUrl()" title="Clear">
                ✕
              </button>
            </div>
            <div class="tabs">
              <button class="tab-btn active" onclick="setMode('single', this)">
                🎬 Single
              </button>
              <button class="tab-btn" onclick="setMode('playlist', this)">
                📋 Playlist
              </button>
            </div>
            <button class="btn-primary" id="fetch-btn" onclick="fetchMedia()">
              Fetch Media Info
            </button>
          </div>
          <div class="section-label">Supported Sites</div>
          <div class="sites-strip">
            <div class="sites-inner" id="sites-inner"></div>
          </div>
        </div>

        <!-- Formats -->
        <div class="view" id="view-formats">
          <div class="media-card" id="media-card"></div>
          <div class="section-label">Presets</div>
          <div class="format-grid" id="presets-grid"></div>
          <div class="section-label">Video Formats</div>
          <div class="format-grid" id="video-grid"></div>
          <div class="section-label">Audio Formats</div>
          <div class="format-grid" id="audio-grid"></div>
          <div style="height: 72px"></div>
        </div>

        <!-- Playlist -->
        <div class="view" id="view-playlist">
          <div class="playlist-header">
            <div class="playlist-title" id="pl-title">Loading…</div>
            <div class="playlist-count" id="pl-count"></div>
            <div class="playlist-actions">
              <button
                class="btn-ghost"
                style="flex: 1"
                onclick="downloadAll('video')"
              >
                ⬇ All (Best)
              </button>
              <button
                class="btn-ghost"
                style="flex: 1"
                onclick="downloadAll('audio')"
              >
                🎵 All Audio
              </button>
            </div>
          </div>
          <div class="section-label">Entries</div>
          <div class="entry-list" id="entry-list"></div>
        </div>

        <!-- Progress -->
        <div class="view" id="view-progress">
          <div class="progress-card">
            <div id="prog-title" class="prog-title">Preparing…</div>
            <div class="prog-status">
              <div class="status-dot queued" id="status-dot"></div>
              <span id="status-label">Queued</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="prog-fill" style="width: 0%"></div>
            </div>
            <div class="prog-stats">
              <div class="stat-box">
                <div class="stat-val" id="stat-pct">0%</div>
                <div class="stat-key">Progress</div>
              </div>
              <div class="stat-box">
                <div class="stat-val" id="stat-speed">—</div>
                <div class="stat-key">Speed</div>
              </div>
              <div class="stat-box">
                <div class="stat-val" id="stat-eta">—</div>
                <div class="stat-key">ETA</div>
              </div>
            </div>
            <div
              id="prog-size"
              style="
                font-size: 11px;
                color: var(--muted);
                font-family: var(--mono);
                text-align: center;
              "
            ></div>
            <div
              id="done-section"
              style="
                display: none;
                flex-direction: column;
                gap: 10px;
                align-items: center;
              "
            >
              <div class="done-icon">✅</div>
              <div class="done-text">Sent to your chat!</div>
              <div class="done-sub">Check your Telegram</div>
              <button
                class="btn-primary"
                onclick="goHome()"
                style="margin-top: 4px"
              >
                Download Another
              </button>
            </div>
            <div
              id="error-section"
              style="display: none; flex-direction: column; gap: 10px"
            >
              <div class="error-box" id="error-msg"></div>
              <button class="btn-primary" onclick="goBack()">← Go Back</button>
            </div>
          </div>
        </div>

        <!-- History -->
        <div class="view" id="view-history">
          <div class="section-row">
            <div class="section-label">Download History</div>
            <button
              class="btn-danger"
              id="clear-btn"
              onclick="clearHistory()"
              style="display: none"
            >
              🗑 Clear All
            </button>
          </div>
          <div id="hist-container"></div>
        </div>
      </main>

      <!-- Download sticky bar -->
      <div class="download-bar" id="dl-bar" style="display: none">
        <button
          class="btn-primary"
          id="dl-btn"
          onclick="startDownload()"
          disabled
        >
          Select a format to download
        </button>
      </div>

      <!-- Bottom nav -->
      <nav class="nav-bar">
        <button class="nav-tab active" id="nav-home" onclick="navTo('home')">
          <span class="ni">🏠</span>Home
        </button>
        <button class="nav-tab" id="nav-history" onclick="navTo('history')">
          <span class="ni">🕓</span>History
          <span class="nav-badge" id="hist-badge"></span>
        </button>
      </nav>

      <div id="toast"></div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
